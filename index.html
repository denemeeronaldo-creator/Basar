<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Display Cards UI</title>
<style>
    /* Basic resets */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f111a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow-x: hidden; }

    /* Container for cards */
    .cards-container {
        display: grid;
        grid-template-areas: 'stack';
        place-items: center;
        position: relative;
        width: 90%;
        max-width: 900px;
    }

    /* Card style */
    .card {
        position: relative;
        width: 22rem;
        height: 9rem;
        padding: 1rem 1.5rem;
        background: rgba(255,255,255,0.05);
        border: 2px solid rgba(255,255,255,0.1);
        border-radius: 1rem;
        backdrop-filter: blur(10px);
        transform: skewY(-8deg);
        transition: all 0.5s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 0.5rem;
    }

    .card:hover {
        transform: skewY(-8deg) translateY(-10px);
        border-color: rgba(255,255,255,0.3);
        background: rgba(255,255,255,0.08);
    }

    .card::after {
        content: '';
        position: absolute;
        top: -5%;
        right: -1px;
        width: 20rem;
        height: 110%;
        background: linear-gradient(to left, rgba(255,255,255,0.05), transparent);
        z-index: 0;
    }

    .card-content {
        position: relative;
        z-index: 1;
    }

    .card-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        background: #1e40af;
        margin-bottom: 0.5rem;
        flex-shrink: 0;
    }

    .card-title {
        font-size: 1.2rem;
        font-weight: 600;
        color: #3b82f6;
    }

    .card-description {
        font-size: 1rem;
        color: #d1d5db;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .card-date {
        font-size: 0.875rem;
        color: #9ca3af;
    }

    /* Card stacking offsets */
    .card:nth-child(1) { transform: skewY(-8deg) translateY(0); z-index: 3; }
    .card:nth-child(2) { transform: skewY(-8deg) translateX(2rem) translateY(1rem); z-index: 2; }
    .card:nth-child(3) { transform: skewY(-8deg) translateX(4rem) translateY(2rem); z-index: 1; }

    /* Icon SVG styling */
    .card-icon svg {
        width: 1.2rem;
        height: 1.2rem;
        fill: #3b82f6;
    }
</style>
</head>
<body>

<div class="cards-container">
    <div class="card">
        <div class="card-content">
            <div class="card-icon">
                <!-- Sparkles icon -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l1.09 3.26L16 6l-2.5 2L15 12l-3-2-3 2 1.5-4L8 6l2.91-.74L12 2z"/></svg>
            </div>
            <p class="card-title">Featured</p>
            <p class="card-description">Discover amazing content</p>
            <p class="card-date">Just now</p>
        </div>
    </div>

    <div class="card">
        <div class="card-content">
            <div class="card-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l1.09 3.26L16 6l-2.5 2L15 12l-3-2-3 2 1.5-4L8 6l2.91-.74L12 2z"/></svg>
            </div>
            <p class="card-title">Popular</p>
            <p class="card-description">Trending this week</p>
            <p class="card-date">2 days ago</p>
        </div>
    </div>

    <div class="card">
        <div class="card-content">
            <div class="card-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l1.09 3.26L16 6l-2.5 2L15 12l-3-2-3 2 1.5-4L8 6l2.91-.74L12 2z"/></svg>
            </div>
            <p class="card-title">New</p>
            <p class="card-description">Latest updates and features</p>
            <p class="card-date">Today</p>
        </div>
    </div>
</div>

</body>
</html>
